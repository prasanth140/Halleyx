<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartPatta</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981;
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * { margin:0; padding:0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }

        /* Animated Background */
        .bg-glow { position: absolute; width: 400px; height: 400px; background: var(--primary); filter: blur(150px); opacity: 0.15; border-radius: 50%; z-index: -1; animation: move 10s infinite alternate; }
        @keyframes move { from { transform: translate(-50%, -50%); } to { transform: translate(50%, 50%); } }

        .auth-card { background: var(--card); width: 420px; padding: 3rem; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); }
        .logo { font-size: 1.8rem; font-weight: 700; color: var(--primary); text-align: center; margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 10px; }

        h2 { text-align: center; margin-bottom: 0.5rem; font-size: 1.5rem; }
        p.subtitle { text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.85rem; }
        .form-group input { width: 100%; padding: 0.9rem 1.2rem; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: white; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }

        .btn { width: 100%; padding: 1rem; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }

        .switch { text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted); }
        .switch a { color: var(--primary); text-decoration: none; font-weight: 600; }

        .error-msg { background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 0.8rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1.5rem; display: none; text-align: center; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="auth-card">
        <div class="logo"><i class="fas fa-seedling"></i> SmartPatta</div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your credentials to access your portal</p>

        <div id="error" class="error-msg">Invalid email or password</div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@domain.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="switch">
            Don't have an account? <a href="signup.html">Create Account</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = e.target[0].value;
            const password = e.target[1].value;
            const errorDiv = document.getElementById('error');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('name', data.name);
                    
                    // Redirect based on role 🚀
                    if (data.role === 'admin') {
                        window.location.href = 'admin-editor.html';
                    } else if (data.role === 'officer') {
                        window.location.href = 'officer-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    errorDiv.innerText = data.error || 'Login failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = 'Server connection failed';
                errorDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
