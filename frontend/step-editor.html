<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowEngine | Step Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --sidebar-bg: #111827;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; }

        .sidebar { width: 260px; height: 100vh; background: var(--sidebar-bg); border-right: 1px solid var(--border); position: fixed; }
        .logo { padding: 2rem; display: flex; align-items: center; gap: 12px; font-size: 1.5rem; color: var(--primary); font-weight: 700; }
        .nav-links { padding: 1rem; }
        .nav-item { display: flex; align-items: center; padding: 0.8rem 1rem; color: var(--text-muted); text-decoration: none; border-radius: 12px; margin-bottom: 0.5rem; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { width: 24px; margin-right: 10px; }

        .main-content { margin-left: 260px; flex: 1; padding: 3rem; }

        .editor-container { max-width: 900px; margin: 0 auto; }
        .editor-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; }
        
        .form-group { margin-bottom: 2rem; }
        .form-group label { display: block; margin-bottom: 0.75rem; font-weight: 500; color: var(--text-main); }
        .form-control { width: 100%; padding: 1rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 1rem; }
        .form-control:focus { outline: none; border-color: var(--primary); }

        .type-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .type-card { background: var(--bg-dark); border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; text-align: center; cursor: pointer; transition: var(--transition); }
        .type-card:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        .type-card.active { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
        .type-card i { font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary); }

        .btn { padding: 1rem 2rem; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }

        .metadata-section { border-top: 1px solid var(--border); padding-top: 2rem; margin-top: 1rem; display: none; }
        .metadata-section.active { display: block; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><i class="fas fa-project-diagram"></i> <span>FlowEngine</span></div>
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="workflows.html" class="nav-item"><i class="fas fa-route"></i> Workflows</a>
            <a href="editor.html" class="nav-item active"><i class="fas fa-edit"></i> Editor</a>
            <a href="tracking.html" class="nav-item"><i class="fas fa-satellite-dish"></i> Execution</a>
            <a href="logs.html" class="nav-item"><i class="fas fa-terminal"></i> Logs</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="editor-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
                <div>
                    <h1>Step Configuration</h1>
                    <p style="color: var(--text-muted);">Define the behavior and logic for this step.</p>
                </div>
                <button class="btn btn-outline" onclick="location.href='editor.html'"><i class="fas fa-arrow-left"></i> Back to Flow</button>
            </div>

            <div class="editor-card">
                <div class="form-group">
                    <label>Step Name</label>
                    <input type="text" class="form-control" value="Manual Risk Assessment">
                </div>

                <label style="display: block; margin-bottom: 0.75rem; font-weight: 500;">Step Type</label>
                <div class="type-selector">
                    <div class="type-card" onclick="selectType('task', this)">
                        <i class="fas fa-robot"></i>
                        <div>Automated Task</div>
                    </div>
                    <div class="type-card active" onclick="selectType('approval', this)">
                        <i class="fas fa-user-check"></i>
                        <div>Manual Approval</div>
                    </div>
                    <div class="type-card" onclick="selectType('notification', this)">
                        <i class="fas fa-bell"></i>
                        <div>Notification</div>
                    </div>
                </div>

                <!-- Metadata for Approval -->
                <div id="meta-approval" class="metadata-section active">
                    <h3 style="margin-bottom: 1.5rem;">Approval Settings</h3>
                    <div class="form-group">
                        <label>Approver Email / Group</label>
                        <input type="text" class="form-control" placeholder="compliance-team@company.com">
                    </div>
                    <div class="form-group">
                        <label>Instructions for Approver</label>
                        <textarea class="form-control" style="height: 100px;" placeholder="Please review the kyc documents attached..."></textarea>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <input type="checkbox" id="wait"> <label for="wait">Wait for all approvers</label>
                    </div>
                </div>

                <!-- Metadata for Notification -->
                <div id="meta-notification" class="metadata-section">
                    <h3 style="margin-bottom: 1.5rem;">Notification Settings</h3>
                    <div class="form-group">
                        <label>Recipient(s)</label>
                        <input type="text" class="form-control" placeholder="user@example.com, {{customer_email}}">
                    </div>
                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" class="form-control" value="Action required on your account">
                    </div>
                    <div class="form-group">
                        <label>Template Body (Markdown supported)</label>
                        <textarea class="form-control" style="height: 150px;"></textarea>
                    </div>
                </div>

                <!-- Metadata for Task -->
                <div id="meta-task" class="metadata-section">
                    <h3 style="margin-bottom: 1.5rem;">Task Configuration</h3>
                    <div class="form-group">
                        <label>Service Endpoint (HTTP/GRPC)</label>
                        <input type="text" class="form-control" placeholder="https://api.internal.service/v1/process">
                    </div>
                    <div class="form-group">
                        <label>Payload Mapping</label>
                        <textarea class="form-control" style="height: 100px; font-family: monospace;">{"userId": "{{input.userId}}", "action": "verify"}</textarea>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 3rem;">
                    <button class="btn btn-outline">Cancel Changes</button>
                    <button class="btn btn-primary" onclick="alert('Step Saved')">Save Step</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function selectType(type, element) {
            // Update UI cards
            document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');

            // Update metadata sections
            document.querySelectorAll('.metadata-section').forEach(s => s.classList.remove('active'));
            document.getElementById('meta-' + type).classList.add('active');
        }
    </script>
</body>
</html>
